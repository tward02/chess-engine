// Aggregator root. The build is split into two modules:
//   :engine  — pure Kotlin/JVM chess core (board, game, bots, evaluators, UCI codec). No UI deps,
//              so a server can depend on it without dragging in Compose.
//   :desktop — Compose Desktop app + UI, depends on :engine. Builds the UCI jar.
// Shared coordinates for both modules:
subprojects {
    group = 'com.tward'
    version = '1.0-SNAPSHOT'
}
